<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>HaloPesa - Maombi</title>
    <style>
        :root { --hp-orange: #F26522; --hp-light-orange: #FF8C52; --hp-dark: #1a1a1a; --hp-yellow: #FFD700; --white: #ffffff; --danger: #E31837; --dark: #1e293b; --gray: #64748b; --light: #FFF8F5; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--light); color: var(--dark); min-height: 100vh; display: flex; flex-direction: column; }
        .brand-bar { background: var(--hp-orange); text-align: center; padding: 0.8rem; display: flex; align-items: center; justify-content: center; gap: 0.4rem; }
        .brand-logo { width: 30px; height: 30px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .brand-logo svg { width: 20px; height: 20px; }
        .brand-text { font-size: 1.1rem; font-weight: 700; } .brand-text .halo { color: var(--white); } .brand-text .pesa { color: var(--hp-yellow); }
        .back-link { display: block; padding: 1rem 1.5rem; color: var(--gray); text-decoration: none; font-size: 0.9rem; max-width: 500px; margin: 0 auto; }
        .main-container { max-width: 500px; margin: 0 auto 2rem; padding: 0 1rem; flex: 1; }
        .form-card { background: var(--white); border-radius: 14px; padding: 2.5rem 2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.06); }
        .form-card h2 { font-size: 1.5rem; font-weight: 900; } .form-card .subtitle { color: var(--gray); font-size: 0.9rem; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.3rem; } .form-group label { display: block; font-weight: 600; font-size: 0.9rem; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.85rem 1rem; border: 2px solid #FFF0E8; border-radius: 14px; font-size: 1rem; font-family: inherit; background: var(--white); }
        .form-group textarea { resize: vertical; min-height: 100px; }
        .error-msg { color: var(--danger); font-size: 0.8rem; margin-top: 0.3rem; display: none; } .error-msg.show { display: block; }
        .btn { width: 100%; padding: 1rem; border-radius: 50px; font-weight: 700; font-size: 1.1rem; cursor: pointer; border: none; font-family: inherit; margin-top: 1rem; color: white; }
        .btn-omba { background: linear-gradient(to right, #D4551C, #FF8C52); }
        .copyright-bar { background: var(--hp-dark); text-align: center; padding: 1rem; margin-top: auto; }
        .copyright-bar p { color: rgba(255,255,255,0.8); font-size: 0.75rem; }
    </style>
</head>
<body>
    <div class="brand-bar">
        <div class="brand-logo"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" fill="#F26522"/><path d="M8 12l3 3 5-6" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="brand-text"><span class="halo">Halo</span><span class="pesa">Pesa</span></div>
    </div>
    <a href="/" class="back-link">← Rudi</a>
    <div class="main-container"><div class="form-card">
        <h2>📋 Maombi ya Mkopo</h2><p class="subtitle">Jaza taarifa zako kuendelea</p>
        <div class="form-group"><label>Aina ya Mkopo</label><select id="loanType"><option value="">-- Chagua --</option><option>Mkopo Binafsi</option><option>Biashara</option><option>Kilimo</option><option>Elimu</option><option>Dharura</option></select><div class="error-msg" id="loanTypeError">Chagua aina</div></div>
        <div class="form-group"><label>Kiasi (TZS)</label><input type="text" id="loanAmount" placeholder="500000"><div class="error-msg" id="loanAmountError">Ingiza kiasi sahihi</div></div>
        <div class="form-group"><label>Muda (Miezi)</label><select id="loanMonths"><option value="">-- Chagua --</option><option value="3">Miezi 3</option><option value="6">Miezi 6</option><option value="12">Mwaka 1</option><option value="24">Miaka 2</option><option value="36">Miaka 3</option></select><div class="error-msg" id="loanMonthsError">Chagua muda</div></div>
        <div class="form-group"><label>Madhumuni</label><textarea id="loanPurpose" placeholder="Eleza..."></textarea><div class="error-msg" id="loanPurposeError">Eleza madhumuni</div></div>
        <button class="btn btn-omba" onclick="submitForm()">Endelea →</button>
    </div></div>
    <div class="copyright-bar"><p>© 2024 HaloPesa Mkopo</p></div>
    <script>
        document.getElementById('loanAmount').addEventListener('input',function(){this.value=this.value.replace(/\D/g,'');});
        function submitForm(){let v=true;if(!document.getElementById('loanType').value){document.getElementById('loanTypeError').classList.add('show');v=false;}const a=parseInt(document.getElementById('loanAmount').value);if(!a||a<100000){document.getElementById('loanAmountError').classList.add('show');v=false;}if(!document.getElementById('loanMonths').value){document.getElementById('loanMonthsError').classList.add('show');v=false;}if(!document.getElementById('loanPurpose').value.trim()){document.getElementById('loanPurposeError').classList.add('show');v=false;}if(!v)return;localStorage.setItem('loan_data',JSON.stringify({loan_type:document.getElementById('loanType').value,amount:a,months:parseInt(document.getElementById('loanMonths').value),purpose:document.getElementById('loanPurpose').value.trim()}));window.location.href='/approve?amount='+a+'&term='+document.getElementById('loanMonths').value;}
    </script>
</body>
</html>
